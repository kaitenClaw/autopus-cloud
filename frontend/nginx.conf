server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location /api/ {
    # Use internal Docker network target to avoid hairpin timeout via public domain.
    proxy_pass http://ocaas-backend-backend-1:3000/api/;
    proxy_http_version 1.1;
    proxy_set_header Host api.autopus.cloud;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
