server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location /api/ {
    # Fallback-only proxy path. The production dashboard should call
    # https://api.autopus.cloud/api directly via VITE_API_BASE_URL.
    proxy_pass https://api.autopus.cloud/api/;
    proxy_http_version 1.1;
    proxy_set_header Host api.autopus.cloud;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
