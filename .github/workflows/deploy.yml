name: Deploy to Coolify

on:
  push:
    branches: [ main ]
    paths:
      - 'services/agent-runtime/**'
      - 'dashboard/**'
      - 'backend/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Trigger Coolify Redeploy
      run: |
        # 使用 Coolify API 觸發 redeploy
        curl -X POST "https://108.160.137.70:8000/api/v1/deploy" \
          -H "Authorization: Bearer ${{ secrets.COOLIFY_API_TOKEN }}" \
          -H "Content-Type: application/json" \
          -d '{
            "uuid": "m804gsswsgsw40wogsoc08oo",
            "force": false
          }' || echo "API call failed, manual redeploy needed"
      continue-on-error: true
      
    - name: Wait for deployment
      run: sleep 30
      
    - name: Health Check
      run: |
        for i in {1..5}; do
          if curl -s http://qkwog480cs4gosocogokw8g4.108.160.137.70.sslip.io/health | grep -q '"status":"ok"'; then
            echo "✅ Deployment successful!"
            exit 0
          fi
          echo "Waiting for deployment... attempt $i/5"
          sleep 10
        done
        echo "⚠️ Deployment may still be in progress"
        exit 0
      
    - name: Notify Telegram
      if: always()
      run: |
        curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d "text=🚀 Autopus Cloud Deployment
Status: ${{ job.status }}
Commit: ${{ github.sha }}
Author: ${{ github.actor }}
Time: $(date -u +'%Y-%m-%d %H:%M UTC')" \
        || true
